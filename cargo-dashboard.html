<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>축산물 통관조회</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI','Malgun Gothic',sans-serif; background:#f4f6f8; color:#26313d; overflow-x:hidden; }
    .header { background:#2b323a; color:#fff; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #1f252b; position:sticky; top:0; z-index:100; }
    .header h1 { font-size:19px; font-weight:700; }
    .header .sub { font-size:12px; opacity:.72; margin-top:2px; }
    .header .right { display:flex; align-items:center; gap:10px; }
    .btn { background:#343a40; color:#fff; border:none; border-radius:5px; padding:7px 12px; font-size:12px; cursor:pointer; font-weight:700; }
    .btn:hover { background:#212529; }
    .btn.gray { background:#6b7684; }
    .btn.green { background:#2f6b4f; }
    .btn.danger { background:#c92a2a; }
    .login-panel { width:380px; margin:110px auto 0; background:#fff; border:1px solid #d9dee4; border-radius:8px; padding:24px; box-shadow:0 12px 28px rgba(27,39,51,.08); }
    .login-panel h2 { margin:0 0 16px; font-size:20px; color:#1f2933; }
    label { display:block; margin:12px 0 6px; font-size:12px; font-weight:700; color:#4b5663; }
    input, select, textarea { width:100%; border:1px solid #ccd3da; border-radius:5px; padding:0 10px; font-size:13px; background:#fff; font-family:inherit; }
    input, select { height:36px; }
    textarea { min-height:64px; padding:8px 10px; resize:vertical; }
    .login-panel .btn { width:100%; height:39px; margin-top:18px; font-size:13px; }
    .error { margin-top:12px; color:#c92a2a; font-size:13px; font-weight:700; line-height:1.45; }
    .toolbar { display:none; align-items:center; justify-content:space-between; padding:12px 16px 0; gap:12px; }
    .toolbar-actions { display:flex; align-items:center; gap:8px; }
    .summary { font-size:12.5px; color:#4b5663; font-weight:700; }
    #boardWrap { overflow-x:auto; overflow-y:hidden; }
    .board { display:none; grid-template-columns:repeat(5, minmax(310px, 1fr)); gap:10px; padding:12px 14px 8px; align-items:start; min-width:1610px; width:100%; }
    .column { border:1px solid #d6dde5; border-radius:8px; min-height:200px; display:flex; flex-direction:column; overflow:hidden; }
    .col-head { padding:8px 10px; font-weight:700; font-size:13px; color:#fff; display:flex; justify-content:space-between; align-items:center; }
    .count { background:rgba(255,255,255,.18); border-radius:999px; padding:1px 8px; font-size:11px; min-width:24px; text-align:center; }
    .stage-arrival-before { background:#eef1f4; border-color:#cfd6de; }
    .stage-arrival { background:#edf4f8; border-color:#c8d9e3; }
    .stage-warehouse { background:#f7f2e8; border-color:#e4d8bd; }
    .stage-declare { background:#edf5ef; border-color:#c9dccf; }
    .stage-release { background:#f0eef6; border-color:#d6d0e4; }
    .stage-arrival-before .col-head { background:#47515c; }
    .stage-arrival .col-head { background:#3f6f8f; }
    .stage-warehouse .col-head { background:#8b7138; }
    .stage-declare .col-head { background:#4a765c; }
    .stage-release .col-head { background:#625984; }
    .col-body { padding:7px; display:flex; flex-direction:column; gap:7px; overflow-y:auto; max-height:calc(100vh - 150px); }
    .empty { text-align:center; color:#8b95a1; font-size:10px; padding:22px 0; }
    .card { background:#fff; border-radius:7px; border:1px solid #dce2e8; padding:7px 8px; font-size:10.4px; position:relative; box-shadow:0 1px 2px rgba(15,23,42,.05); }
    .stage-arrival-before .card { border-left:4px solid #6b747f; }
    .stage-arrival .card { border-left:4px solid #5f8faa; }
    .stage-warehouse .card { border-left:4px solid #aa8f4b; }
    .stage-declare .card { border-left:4px solid #679675; }
    .stage-release .card { border-left:4px solid #8176a5; }
    .card.over { border:2px solid #fa5252; border-left-width:4px; background:#fff5f5; }
    .card.warn { border:2px solid #fd7e14; border-left-width:4px; background:#fff9f0; }
    .stage-declare .card.permit-ready { background:#f3f8f5; border-color:#b9d4c3; border-left-color:#2f7d52; }
    .revision-badge { position:absolute; top:-6px; right:7px; background:#495057; color:#fff; font-size:9px; padding:1px 6px; border-radius:6px; font-weight:700; }
    .top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; gap:6px; }
    .consignee { font-weight:700; font-size:11.4px; color:#1f2933; word-break:keep-all; line-height:1.18; }
    .bl { font-family:Consolas,monospace; font-size:10px; color:#26313d; font-weight:700; word-break:break-all; margin-top:1px; }
    .grid { display:grid; grid-template-columns:56px 1fr; row-gap:2px; column-gap:6px; margin:4px 0; }
    .k { color:#7b8794; font-size:9.8px; white-space:nowrap; font-weight:600; }
    .v { color:#26313d; word-break:keep-all; overflow-wrap:anywhere; line-height:1.24; font-weight:500; }
    .v.strong { font-weight:700; }
    .badges { display:flex; flex-wrap:wrap; gap:3px; margin:5px 0 2px; }
    .badge { font-size:9.7px; padding:1px 5px; border-radius:5px; font-weight:600; background:#f5f7f9; color:#495057; border:1px solid #e2e8ee; }
    .b-pass { background:#edf5ef; color:#3f6f50; border-color:#c9dccf; }
    .b-fail { background:#fff5f5; color:#c92a2a; border-color:#ffc9c9; }
    .b-wait, .b-permit, .b-none { background:#f8f9fa; color:#495057; }
    .doc-box { margin:5px 0 3px; padding:5px 6px; border:1px solid #dbe3ea; border-radius:6px; background:#f8fafc; display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:10px; font-weight:800; }
    .doc-box .doc-title { color:#334155; }
    .doc-pill { display:inline-flex; align-items:center; gap:3px; border-radius:999px; padding:2px 7px; border:1px solid transparent; font-size:10px; font-weight:900; }
    .doc-pill.ok { background:#e8f5ee; color:#1f6f43; border-color:#acd7bf; }
    .doc-pill.no { background:#fff1f1; color:#c92a2a; border-color:#ffc9c9; }
    .quota-box { margin-top:5px; padding-top:5px; border-top:1px solid #edf1f4; font-size:9.9px; line-height:1.28; }
    .quota-line { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:3px; }
    .quota-check { display:flex; align-items:center; gap:4px; margin:0; font-size:9.9px; font-weight:700; color:#495057; cursor:pointer; }
    .quota-check input { width:12px; height:12px; padding:0; margin:0; }
    .quota-date { display:flex; align-items:center; gap:5px; margin:3px 0; color:#495057; }
    .quota-date input { width:108px; height:24px; padding:2px 5px; font-size:10px; }
    .quota-detail { display:block; margin-top:2px; }
    .quota-detail.danger { color:#c92a2a; font-weight:700; }
    .revision-box { margin-top:5px; border-top:1px solid #edf1f4; padding-top:5px; }
    .revision-title { color:#495057; font-weight:700; font-size:10px; margin-bottom:3px; }
    .revision-list { display:flex; flex-direction:column; gap:4px; }
    .revision-item { background:#f8f9fa; border:1px solid #edf0f2; border-radius:5px; padding:4px 5px; line-height:1.28; word-break:break-word; }
    .revision-date { color:#adb5bd; font-size:9px; margin-top:1px; }
    .release-bar { height:4px; background:#e9ecef; border-radius:3px; margin-top:3px; overflow:hidden; }
    .release-bar > div { height:100%; background:#495057; border-radius:3px; }
    .card-actions { display:flex; justify-content:flex-end; margin-top:6px; border-top:1px solid #edf1f4; padding-top:6px; }
    .request-btn { background:#2f5f46; color:#fff; border:none; border-radius:5px; padding:4px 8px; font-size:10px; font-weight:700; cursor:pointer; }
    .modal-bg { display:none; position:fixed; inset:0; background:rgba(15,23,42,.42); z-index:200; align-items:center; justify-content:center; }
    .modal { width:470px; max-height:92vh; overflow:auto; background:#fff; border:1px solid #d9dee4; border-radius:8px; box-shadow:0 18px 42px rgba(15,23,42,.2); padding:18px; }
    .modal h2 { font-size:17px; margin-bottom:10px; color:#1f2933; }
    .modal-card { background:#f8f9fa; border:1px solid #edf0f2; border-radius:6px; padding:9px; margin-bottom:10px; font-size:11px; line-height:1.45; }
    .modal-row { display:grid; grid-template-columns:78px 1fr; gap:5px; }
    .modal-options { display:flex; gap:12px; align-items:center; margin:10px 0; font-size:12px; font-weight:700; color:#495057; }
    .modal-options label { display:flex; align-items:center; gap:5px; margin:0; cursor:pointer; }
    .modal-options input { width:13px; height:13px; margin:0; padding:0; }
    .modal-field { margin-top:8px; }
    .modal-field label { display:block; margin:0 0 4px; font-size:11px; color:#495057; font-weight:700; }
    .field-hint { display:inline-block; margin-left:5px; color:#8b95a1; font-size:10px; font-weight:600; }
    .modal-actions { display:flex; justify-content:flex-end; gap:7px; margin-top:12px; }
    .admin-panel { display:none; position:fixed; left:50%; top:86px; transform:translateX(-50%); width:min(1180px, calc(100vw - 48px)); max-height:calc(100vh - 110px); overflow:auto; background:#f7f9fb; border:1px solid #cfd6de; border-radius:8px; padding:18px; z-index:180; box-shadow:0 18px 48px rgba(15,23,42,.22); }
    .admin-layout { display:grid; grid-template-columns:360px 1fr; gap:14px; align-items:start; }
    .admin-card { background:#fff; border:1px solid #d9dee4; border-radius:8px; padding:16px; }
    .admin-card h2 { font-size:16px; margin-bottom:10px; }
    .admin-table-wrap { overflow-x:auto; background:#fff; border:1px solid #d9dee4; border-radius:8px; }
    .admin-table { width:100%; min-width:880px; table-layout:fixed; border-collapse:collapse; font-size:12px; background:#fff; }
    .admin-table th, .admin-table td { border-bottom:1px solid #edf1f4; text-align:left; padding:8px; vertical-align:top; }
    .admin-table th { background:#f7f9fb; color:#4b5663; font-weight:700; }
    .admin-table th:nth-child(1), .admin-table td:nth-child(1) { width:58px; }
    .admin-table th:nth-child(2), .admin-table td:nth-child(2) { width:110px; }
    .admin-table th:nth-child(3), .admin-table td:nth-child(3) { width:150px; }
    .admin-table th:nth-child(4), .admin-table td:nth-child(4) { width:120px; }
    .admin-table th:nth-child(6), .admin-table td:nth-child(6) { width:56px; text-align:center; }
    .admin-table th:nth-child(7), .admin-table td:nth-child(7) { width:62px; text-align:center; }
    .admin-table td { word-break:break-word; overflow-wrap:anywhere; }
    .admin-actions { display:flex; gap:6px; flex-wrap:wrap; }
    .docs-panel { display:none; padding:12px 16px 18px; }
    .docs-inner { background:#fff; border:1px solid #d9dee4; border-radius:8px; overflow:hidden; }
    .docs-head { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:12px 14px; border-bottom:1px solid #edf1f4; }
    .docs-head h2 { font-size:15px; color:#1f2933; }
    .docs-table { width:100%; border-collapse:collapse; table-layout:fixed; font-size:11px; }
    .docs-table th, .docs-table td { border-bottom:1px solid #edf1f4; padding:7px 8px; text-align:left; vertical-align:middle; word-break:break-word; }
    .docs-table th { background:#f7f9fb; color:#4b5663; font-size:10px; font-weight:800; }
    .docs-table select { height:28px; padding:0 6px; font-size:11px; }
    .docs-table .narrow { width:76px; text-align:center; }
    .docs-table .action { width:82px; text-align:center; }
    @media (max-width:1700px){ .board { grid-template-columns:repeat(5, 310px); } }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>축산물 통관조회</h1>
      <div class="sub">화주별 B/L 통관 마일스톤 조회</div>
    </div>
    <div class="right">
      <button id="logoutBtn" class="btn gray" style="display:none" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <section id="loginPanel" class="login-panel">
    <h2>로그인</h2>
    <form onsubmit="login(event)">
      <label for="loginId">아이디</label>
      <input id="loginId" autocomplete="username">
      <label for="password">비밀번호</label>
      <input id="password" type="password" autocomplete="current-password">
      <button class="btn" type="submit">조회하기</button>
      <div id="loginError" class="error"></div>
    </form>
  </section>

  <main>
    <div id="toolbar" class="toolbar">
      <div id="summary" class="summary"></div>
      <div class="toolbar-actions">
        <button id="docsStatusBtn" class="btn gray" style="display:none" onclick="openDocsStatus()">원본필수서류 수취현황</button>
        <button id="adminSettingsBtn" class="btn gray" style="display:none" onclick="openAdminSettings()">관리자 설정</button>
        <button class="btn" onclick="loadData()">새로고침</button>
      </div>
    </div>
    <div id="boardWrap">
      <div id="board" class="board"></div>
    </div>
    <section id="docsPanel" class="docs-panel">
      <div class="docs-inner">
        <div class="docs-head">
          <h2>원본필수서류 &lt;OBL, H/C(위생증, 검역증)&gt; 수취현황</h2>
          <button class="btn gray" onclick="closeDocsStatus()">닫기</button>
        </div>
        <table class="docs-table">
          <thead>
            <tr>
              <th>화주</th>
              <th>B/L</th>
              <th>반출처</th>
              <th>품명</th>
              <th>마일스톤</th>
              <th class="narrow">OBL</th>
              <th class="narrow">H/C</th>
              <th>수정일</th>
              <th class="action">관리</th>
            </tr>
          </thead>
          <tbody id="docsRows"></tbody>
        </table>
      </div>
    </section>
    <section id="adminPanel" class="admin-panel">
      <div class="toolbar" style="display:flex;padding:0 0 12px">
        <div class="summary">관리자 설정</div>
        <div class="toolbar-actions">
          <button class="btn" onclick="loadAdmin()">새로고침</button>
          <button class="btn gray" onclick="closeAdminSettings()">닫기</button>
        </div>
      </div>
      <div class="admin-layout">
        <form class="admin-card" onsubmit="saveAdminAccount(event)">
          <h2 id="adminFormTitle">계정 추가</h2>
          <input id="adminAccountId" type="hidden">
          <label>권한</label>
          <select id="adminRole">
            <option value="shipper">화주</option>
            <option value="admin">관리자</option>
          </select>
          <label>아이디</label>
          <input id="adminLoginId">
          <label>비밀번호</label>
          <input id="adminPassword" type="password" placeholder="신규 또는 변경 시 입력">
          <label>표시명</label>
          <input id="adminDisplayName" placeholder="예: 현대코퍼레이션H">
          <label>필터텍스트</label>
          <input id="adminFilter" placeholder="예: 현대코">
          <label>출고요청 메일 받는 사람</label>
          <textarea id="adminReleaseTo" placeholder="쉼표로 구분: a@aincustoms.com,b@aincustoms.com"></textarea>
          <label><input id="adminActive" type="checkbox" style="width:13px;height:13px;margin-right:5px" checked> 사용</label>
          <div class="admin-actions" style="margin-top:12px">
            <button class="btn green" type="submit">저장</button>
            <button class="btn gray" type="button" onclick="resetAdminForm()">새 계정</button>
          </div>
          <div id="adminError" class="error"></div>
        </form>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>권한</th>
                <th>아이디</th>
                <th>표시명</th>
                <th>필터텍스트</th>
                <th>출고요청 메일</th>
                <th>상태</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="adminRows"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div id="releaseModalBg" class="modal-bg">
    <div class="modal">
      <h2 id="requestModalTitle">출고요청</h2>
      <div id="releaseModalCard" class="modal-card"></div>
      <div class="modal-options" id="releaseTypeOptions">
        <label><input type="radio" name="releaseType" value="full" checked onchange="toggleReleaseType()"> 전량</label>
        <label><input type="radio" name="releaseType" value="partial" onchange="toggleReleaseType()"> 일부 물량</label>
      </div>
      <div class="modal-field" id="releaseWeightWrap" style="display:none">
        <label for="releaseWeight">요청물량</label>
        <input id="releaseWeight" type="number" min="0" step="0.1">
      </div>
      <div class="modal-field">
        <label for="releaseRequester">요청담당자</label>
        <input id="releaseRequester" placeholder="이름 / 연락처">
      </div>
      <div class="modal-field">
        <label for="requesterEmail">요청인 메일<span class="field-hint">요청 메일의 참조(CC)에 들어갑니다.</span></label>
        <input id="requesterEmail" type="email" placeholder="name@example.com">
      </div>
      <div class="modal-field">
        <label for="releaseAddress">출고지주소</label>
        <textarea id="releaseAddress" placeholder="출고지 주소를 입력하세요."></textarea>
      </div>
      <div class="modal-field">
        <label for="releaseDate">출고월일<span class="field-hint">올해 연도로 자동 저장됩니다.</span></label>
        <input id="releaseDate" type="text" inputmode="numeric" maxlength="5" placeholder="MM-DD" onblur="formatRequestDateInput(this)">
      </div>
      <div class="modal-field">
        <label for="releaseMemo">요청사항</label>
        <textarea id="releaseMemo" placeholder="차량, 운송, 기타 요청사항을 입력하세요."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn gray" onclick="closeReleaseModal()">취소</button>
        <button class="btn" onclick="submitReleaseRequest()">요청 발송</button>
      </div>
    </div>
  </div>

  <script>
    const stageClasses = {
      "입항전": "stage-arrival-before",
      "입항": "stage-arrival",
      "반입": "stage-warehouse",
      "수입신고": "stage-declare",
      "반출": "stage-release"
    };
    let releaseRequestCard = null;
    let requestMode = "release";
    let adminAccounts = [];
    let currentUserRole = "shipper";
    let currentCards = [];

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[ch]));
    }
    function jsStr(value) {
      return String(value ?? "").replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/\r/g, "\\r").replace(/\n/g, "\\n");
    }
    function displayConsignee(value) {
      return String(value || "-").replace(/현대코퍼레이션H|현대코퍼레이션|현대코퍼|현대코/g, "현대코퍼레이션H");
    }
    function fmtWeight(value, unit) {
      if (value === null || value === undefined || value === "" || Number.isNaN(Number(value))) return "-";
      return Number(value).toLocaleString("ko-KR", { maximumFractionDigits: 1 }) + (unit || "KG");
    }
    function numberValue(value) {
      if (value === null || value === undefined || value === "") return null;
      const parsed = Number(String(value).replace(/,/g, ""));
      return Number.isFinite(parsed) ? parsed : null;
    }
    function displayDate(value) {
      if (!value) return "-";
      return String(value).replace("T", " ").replace(/\.\d+(\+00:00|Z)?$/, "").replace("+00:00", "");
    }
    function normalizeRequestDate(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      let month = "";
      let day = "";
      let match = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
      if (match) {
        month = match[2];
        day = match[3];
      } else {
        match = raw.match(/^(\d{1,2})[-./](\d{1,2})$/);
        if (match) {
          month = match[1];
          day = match[2];
        } else if (/^\d{4}$/.test(raw)) {
          month = raw.slice(0, 2);
          day = raw.slice(2, 4);
        } else {
          return null;
        }
      }
      const year = new Date().getFullYear();
      const monthNumber = Number(month);
      const dayNumber = Number(day);
      const date = new Date(year, monthNumber - 1, dayNumber);
      if (
        !Number.isInteger(monthNumber) ||
        !Number.isInteger(dayNumber) ||
        date.getFullYear() !== year ||
        date.getMonth() !== monthNumber - 1 ||
        date.getDate() !== dayNumber
      ) {
        return null;
      }
      return `${year}-${String(monthNumber).padStart(2, "0")}-${String(dayNumber).padStart(2, "0")}`;
    }
    function toRequestMonthDay(value) {
      const normalized = normalizeRequestDate(value);
      return normalized ? normalized.slice(5) : "";
    }
    function formatRequestDateInput(input) {
      const normalized = normalizeRequestDate(input.value);
      if (normalized) input.value = normalized.slice(5);
    }

      document.getElementById("board").style.display = "none";

    async function login(event) {
      event.preventDefault();
      document.getElementById("loginError").textContent = "";
      const response = await fetch("/api/cargo-login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          login_id: document.getElementById("loginId").value.trim(),
          password: document.getElementById("password").value.trim()
        })
      });
      const result = await response.json();
      if (!result.success) {
        showLogin(result.message || "로그인에 실패했습니다.");
        return;
      }
      if (result.user.role === "admin") {
        await loadData();
      } else {
        showCargoUi();
        await loadData();
      }
    }

    async function loadData() {
      const response = await fetch("/api/cargo-data");
      const result = await response.json();
      if (!result.success) {
        showLogin(result.message || "");
        return;
      }
      currentUserRole = result.user.role || "shipper";
      currentCards = result.cards || [];
      showCargoUi();
      document.getElementById("summary").textContent =
        currentUserRole === "admin"
          ? `관리자 전체 통관 현황 · 총 ${result.total}건 · 마지막 동기화 ${displayDate(result.last_update)}`
          : `${displayConsignee(result.user.display_name)} 통관 현황 · 총 ${result.total}건 · 마지막 동기화 ${displayDate(result.last_update)}`;
      const board = document.getElementById("board");
      board.innerHTML = result.stages.map(stage => {
        const cards = currentCards.filter(card => card.stage === stage);
        return `
          <section class="column ${stageClasses[stage] || ""}">
            <div class="col-head"><span>${stage}</span><span class="count">${cards.length}</span></div>
            <div class="col-body">
              ${cards.length ? cards.map(cardHtml).join("") : '<div class="empty">해당 없음</div>'}
            </div>
          </section>
        `;
      }).join("");
      if (document.getElementById("docsPanel").style.display !== "none") renderDocsStatus();
    }

    function qBadge(label, value) {
      const text = value || "-";
      if (!value) return `<span class="badge b-none">${label} -</span>`;
      if (String(value).includes("불합격")) return `<span class="badge b-fail">${label} 불합격</span>`;
      if (String(value).includes("합격")) return `<span class="badge b-pass">${label} 합격</span>`;
      return `<span class="badge b-wait">${label} ${esc(text)}</span>`;
    }
    function permitBadge(card) {
      if (card.import_permitted) return `<span class="badge b-permit">수입신고 ${esc(card.import_permit_date || "-")}</span>`;
      if (card.import_declared) return `<span class="badge b-wait">수입신고 수리대기</span>`;
      return `<span class="badge b-none">수입신고 -</span>`;
    }
    function quotaHtml(card) {
      const checked = card.is_quota ? "checked" : "";
      const disabled = currentUserRole === "admin" ? "disabled" : "";
      const dateLine = card.is_quota ? `
        <div class="quota-date">
          <span>추천서 교부일</span>
          <input type="date" ${disabled} value="${esc(card.quota_permit_date || "")}" onchange="saveQuotaInput('${jsStr(card.bl_number)}', true, this.value)">
        </div>
      ` : "";
      const importClass = card.import_declare_alert || (card.is_quota && card.import_declare_message && !String(card.import_declare_message).includes("완료")) ? "danger" : "";
      const importMsg = card.import_declare_message ? `<span class="quota-detail ${importClass}">${esc(card.import_declare_message)}</span>` : "";
      const releaseClass = card.quota_release_alert ? "danger" : (card.is_quota && card.quota_release_message && !String(card.quota_release_message).includes("완료") ? "danger" : "");
      const releaseMsg = card.quota_release_message ? `<span class="quota-detail ${releaseClass}">${esc(card.quota_release_message)}</span>` : "";
      return `
        <div class="quota-box">
          <div class="quota-line">
            <label class="quota-check">
              <input type="checkbox" ${checked} ${disabled} onchange="saveQuotaInput('${jsStr(card.bl_number)}', this.checked, this.checked ? '${jsStr(card.quota_permit_date || "")}' : '')">
              할당관세
            </label>
          </div>
          ${dateLine}
          ${importMsg}${releaseMsg}
        </div>
      `;
    }
    function revisionsHtml(card) {
      const revisions = card.revisions || [];
      if (!revisions.length) return "";
      return `
        <div class="revision-box">
          <div class="revision-title">확인사항</div>
          <div class="revision-list">
            ${revisions.map(item => `
              <div class="revision-item">
                <div>${esc(item.text || item)}</div>
                ${item.created_at ? `<div class="revision-date">${esc(item.created_at)}${item.updated_at ? " · 수정 " + esc(item.updated_at) : ""}</div>` : ""}
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }
    function originalDocsHtml(card) {
      const obl = !!card.obl_received;
      const hc = !!card.hc_received;
      return `
        <div class="doc-box">
          <span class="doc-title">원본필수서류</span>
          <span class="doc-pill ${obl ? "ok" : "no"}">OBL ${obl ? "O" : "X"}</span>
          <span class="doc-pill ${hc ? "ok" : "no"}">H/C ${hc ? "O" : "X"}</span>
        </div>
      `;
    }
    function releaseHtml(card) {
      if (!(card.base_weight > 0)) return "";
      const pct = Math.min(100, Math.round((card.released_weight || 0) / card.base_weight * 100));
      return `
        <div class="grid" style="margin-top:7px">
          <div class="k">반출합계</div><div class="v">${fmtWeight(card.released_weight, card.weight_unit)} / ${fmtWeight(card.base_weight, card.weight_unit)} (${pct}%)</div>
          <div class="k">반출상태</div><div class="v strong">${esc(card.release_status || "-")}</div>
          <div class="k">잔량</div><div class="v strong">${card.fully_released ? "반출완료" : fmtWeight(card.remaining_weight, card.weight_unit)}</div>
        </div>
        <div class="release-bar"><div style="width:${pct}%"></div></div>
      `;
    }
    function releaseRequestButton(card) {
      if (currentUserRole === "admin") return "";
      if (card.stage !== "수입신고") return "";
      return `
        <div class="card-actions">
          <button class="request-btn" onclick="openReleaseModal('${jsStr(card.bl_number)}')">출고요청</button>
        </div>

    function importRequestButton(card) {
      if (currentUserRole === "admin") return "";

          <button class="request-btn" onclick="openImportModal('${jsStr(card.bl_number)}')">수입신고요청</button>

    function cardHtml(card) {
      const alertClass = card.quota_alert === "over" ? " over" : (card.quota_alert === "warn" ? " warn" : "");
      const permitClass = card.stage === "수입신고" && card.import_permitted ? " permit-ready" : "";
      return `
        <article class="card${alertClass}${permitClass}">
          ${(card.revisions || []).length ? '<span class="revision-badge">확인사항</span>' : ""}
          <div class="top">
            <div>
              <div class="consignee">${esc(displayConsignee(card.consignee))}</div>
              <div class="bl">${esc(card.bl_number)}</div>
            </div>
          </div>
          <div class="grid">
            <div class="k">반출처</div><div class="v">${esc(card.destination || "-")}</div>
            <div class="k">품명</div><div class="v">${esc(card.product_name || "-")}</div>
            <div class="k">적출국</div><div class="v">${esc(card.load_country_name || "-")} ${card.load_country ? "(" + esc(card.load_country) + ")" : ""}</div>
            <div class="k">총중량</div><div class="v">${fmtWeight(card.total_weight, card.weight_unit)}</div>
            <div class="k">최초반입</div><div class="v"><b>${esc(card.first_arrival_date || "-")}</b></div>
            ${card.warehouse_arrival_date && card.warehouse_arrival_date !== card.first_arrival_date ? `<div class="k">창고반입</div><div class="v">${esc(card.warehouse_arrival_date)}</div>` : ""}
            ${card.shed_name ? `<div class="k">장치장</div><div class="v">${esc(card.shed_name)}</div>` : ""}
            <div class="k">진행상태</div><div class="v">${esc(card.prgs_stts || (card.stage === "입항전" ? "조회 전" : "-"))}</div>
          </div>
          <div class="badges">
            ${qBadge("동물검역", card.animal_quarantine)}
            ${qBadge("식품검역", card.food_quarantine)}
            ${permitBadge(card)}
          </div>
          ${originalDocsHtml(card)}

          ${revisionsHtml(card)}
          ${importRequestButton(card)}

    async function saveQuotaInput(blNumber, isQuota, quotaPermitDate) {
      const response = await fetch("/api/cargo-quota", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          bl_number: blNumber,
          is_quota: !!isQuota,
          quota_permit_date: isQuota ? (quotaPermitDate || "") : ""
        })
      });
      const result = await response.json();
      if (!result.success) {
        alert(result.message || "할당관세 저장에 실패했습니다.");
        return;
      }
      await loadData();
    }

          <td class="narrow">

              <option value="false" ${obl ? "" : "selected"}>X</option>
              <option value="true" ${obl ? "selected" : ""}>O</option>
            </select>
          </td>
          <td class="narrow">
            <select id="docsHc${index}">
              <option value="false" ${hc ? "" : "selected"}>X</option>

    async function saveOriginalDocs(cardIndex, rowIndex) {
      const card = currentCards[cardIndex];
      if (!card) return;
      const obl = document.getElementById(`docsObl${rowIndex}`).value === "true";
      const hc = document.getElementById(`docsHc${rowIndex}`).value === "true";
      const response = await fetch("/api/cargo-original-docs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          account_id: card.account_id,
          bl_number: card.bl_number,
          obl_received: obl,
          hc_received: hc
        })
      });
      const result = await response.json();
      if (!result.success) {
        alert(result.message || "원본서류 수취현황 저장에 실패했습니다.");
        return;
      }
      card.obl_received = obl;
      card.hc_received = hc;
      card.original_docs_updated_at = result.item?.updated_at || new Date().toISOString();
      renderDocsStatus();
    }

        <div class="modal-row"><b>품명</b><span>${esc(releaseRequestCard.product_name || "-")}</span></div>

    async function submitReleaseRequest() {
      if (!releaseRequestCard) return;
      const type = document.querySelector('input[name="releaseType"]:checked').value;
      const requestedReleaseDate = normalizeRequestDate(document.getElementById("releaseDate").value);
      if (requestedReleaseDate === null) {
        alert("출고월일은 MM-DD 형식으로 입력해 주세요. 예: 07-15");
        return;
      }
      const commonBody = {
        bl_number: releaseRequestCard.bl_number,
        requester_name: document.getElementById("releaseRequester").value,
        requester_email: document.getElementById("requesterEmail").value,
        delivery_address: document.getElementById("releaseAddress").value,
        requested_release_date: requestedReleaseDate,
        memo: document.getElementById("releaseMemo").value
      };
      const body = requestMode === "import" ? commonBody : {
        ...commonBody,
        request_type: type,
        requested_weight: type === "partial" ? document.getElementById("releaseWeight").value : ""
      };
      const endpoint = requestMode === "import" ? "/api/cargo-import-request" : "/api/cargo-release-request";
      const response = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const result = await response.json();
      if (!result.success) {
        alert(result.message || (requestMode === "import" ? "수입신고요청에 실패했습니다." : "출고요청에 실패했습니다."));
        return;
      }
      const successText = requestMode === "import" ? "수입신고요청" : "출고요청";
      closeReleaseModal();
      alert(result.email_sent ? `${successText}이 발송되었습니다.` : `${successText}은 저장되었습니다. 메일 발송 환경변수를 확인해 주세요.`);
    }

      document.getElementById("adminActive").checked = true;
      document.getElementById("adminError").textContent = "";
    }
    function editAdminAccount(id) {
      const account = adminAccounts.find(item => item.id === id);
      if (!account) return;
      document.getElementById("adminFormTitle").textContent = "계정 수정";
      document.getElementById("adminAccountId").value = account.id;
      document.getElementById("adminRole").value = account.role || "shipper";
      document.getElementById("adminLoginId").value = account.login_id || "";
      document.getElementById("adminPassword").value = "";
      document.getElementById("adminDisplayName").value = displayConsignee(account.display_name || "");
      document.getElementById("adminFilter").value = account.consignee_filter || "";
      document.getElementById("adminReleaseTo").value = account.release_request_to || "";
      document.getElementById("adminActive").checked = account.is_active !== false;
      document.getElementById("adminError").textContent = "";
    }
    async function saveAdminAccount(event) {
      event.preventDefault();
      document.getElementById("adminError").textContent = "";
      const payload = {
        id: document.getElementById("adminAccountId").value || null,
        role: document.getElementById("adminRole").value,
        login_id: document.getElementById("adminLoginId").value,
        password: document.getElementById("adminPassword").value,
        display_name: document.getElementById("adminDisplayName").value,
        consignee_filter: document.getElementById("adminFilter").value,
        release_request_to: document.getElementById("adminReleaseTo").value,
        is_active: document.getElementById("adminActive").checked
      };
      const response = await fetch("/api/cargo-admin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const result = await response.json();
      if (!result.success) {
        document.getElementById("adminError").textContent = result.message || "저장에 실패했습니다.";
        return;
      }
      resetAdminForm();
      await loadAdmin();
    }

    async function logout() {
      await fetch("/api/cargo-logout", { method: "POST" });
      location.reload();
    }

    loadData();
  </script>
</body>
</html>
