name: Patch cargo request UI

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/patch-cargo-request-ui.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch cargo dashboard HTML
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'cargo-dashboard.html';
          let html = fs.readFileSync(path, 'utf8');
          const original = html;
          function replaceOnce(from, to, label) {
            if (!html.includes(from)) {
              if (html.includes(to)) return;
              throw new Error(`Pattern not found: ${label}`);
            }
            html = html.replace(from, to);
          }
          replaceOnce('    .modal-field label { display:block; margin:0 0 4px; font-size:11px; color:#495057; font-weight:700; }\n    .modal-actions', '    .modal-field label { display:block; margin:0 0 4px; font-size:11px; color:#495057; font-weight:700; }\n    .field-hint { display:inline-block; margin-left:5px; color:#8b95a1; font-size:10px; font-weight:600; }\n    .modal-actions', 'field hint css');
          replaceOnce('<h2>출고요청</h2>', '<h2 id="requestModalTitle">출고요청</h2>', 'modal title id');
          replaceOnce('<div class="modal-options">', '<div class="modal-options" id="releaseTypeOptions">', 'release options id');
          replaceOnce('      <div class="modal-field">\n        <label for="releaseRequester">요청담당자</label>\n        <input id="releaseRequester" placeholder="이름 / 연락처">\n      </div>\n      <div class="modal-field">\n        <label for="releaseAddress">출고지주소</label>', '      <div class="modal-field">\n        <label for="releaseRequester">요청담당자</label>\n        <input id="releaseRequester" placeholder="이름 / 연락처">\n      </div>\n      <div class="modal-field">\n        <label for="requesterEmail">요청인 메일<span class="field-hint">요청 메일의 참조(CC)에 들어갑니다.</span></label>\n        <input id="requesterEmail" type="email" placeholder="name@example.com">\n      </div>\n      <div class="modal-field">\n        <label for="releaseAddress">출고지주소</label>', 'requester email field');
          replaceOnce('    let releaseRequestCard = null;\n    let adminAccounts = [];', '    let releaseRequestCard = null;\n    let requestMode = "release";\n    let adminAccounts = [];', 'request mode state');
          replaceOnce('    function releaseRequestButton(card) {\n      if (card.stage !== "수입신고") return "";\n      return `\n        <div class="card-actions">\n          <button class="request-btn" onclick="openReleaseModal(\'${jsStr(card.bl_number)}\')">출고요청</button>\n        </div>\n      `;\n    }\n    function cardHtml(card) {', '    function releaseRequestButton(card) {\n      if (card.stage !== "수입신고") return "";\n      return `\n        <div class="card-actions">\n          <button class="request-btn" onclick="openReleaseModal(\'${jsStr(card.bl_number)}\')">출고요청</button>\n        </div>\n      `;\n    }\n    function importRequestButton(card) {\n      if (card.stage !== "반입") return "";\n      return `\n        <div class="card-actions">\n          <button class="request-btn" onclick="openImportModal(\'${jsStr(card.bl_number)}\')">수입신고요청</button>\n        </div>\n      `;\n    }\n    function cardHtml(card) {', 'import request button function');
          replaceOnce('          ${quotaHtml(card)}\n          ${revisionsHtml(card)}\n          ${releaseRequestButton(card)}', '          ${quotaHtml(card)}\n          ${revisionsHtml(card)}\n          ${importRequestButton(card)}\n          ${releaseRequestButton(card)}', 'render import request button');
          const start = html.indexOf('    async function openReleaseModal(blNumber) {');
          const end = html.indexOf('    async function loadAdmin() {', start);
          if (start === -1 || end === -1) throw new Error('request modal function block not found');
          const block = Buffer.from('', 'base64').toString('utf8');
          html = html.slice(0, start) + block + html.slice(end);
          if (html === original) {
            console.log('No changes needed.');
            process.exit(0);
          }
          fs.writeFileSync(path, html);
          NODE
      - name: Commit patched HTML
        run: |
          if git diff --quiet cargo-dashboard.html; then
            echo "No HTML diff."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cargo-dashboard.html
          git commit -m "Add import clearance request UI"
          git push
